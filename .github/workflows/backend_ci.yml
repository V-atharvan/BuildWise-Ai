name: Backend FastAPI CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: buildwise_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd buildwise_api
        pip install --upgrade pip
        pip install -r requirements.txt pytest httpx pytest-asyncio

    - name: Run code linters
      run: |
        cd buildwise_api
        pip install flake8
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run test suite with PyTest
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/buildwise_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        cd buildwise_api
        python -m pytest
