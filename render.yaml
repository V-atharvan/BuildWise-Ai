services:
  # FastAPI API Web Service
  - type: web
    name: buildwise-api
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: buildwise_api
    plan: starter
    healthCheckPath: /api/v1/health
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buildwise-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: buildwise-redis
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: '["https://app.yourdomain.com", "https://*.vercel.app", "http://localhost:3000"]'
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_CREDENTIALS_PATH
        value: ""
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"

  # Celery Background Worker — uses a separate Dockerfile
  - type: worker
    name: buildwise-celery
    env: docker
    dockerfilePath: Dockerfile.celery
    dockerContext: buildwise_api
    plan: starter
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buildwise-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: buildwise-redis
          property: connectionString

  # Redis Cache / Task Queue
  - type: redis
    name: buildwise-redis
    plan: free
    ipAllowList: []

databases:
  # PostgreSQL Database Instance
  - name: buildwise-db
    plan: free
    databaseName: buildwise
    user: buildwise
